<!DOCTYPE html>
<html lang="sl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prijava podjetja | Študentsko delo</title>
    <style>
        :root {
            --primarna-modra: #1a237e;
            --poudarek-oranza: #ff6f00;
            --bg-svetla: #f4f7f6;
            --text-glavni: #333;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-svetla);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px 0;
        }

        .auth-card {
            background: white;
            width: 100%;
            max-width: 400px;
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.08);
            border-top: 6px solid var(--primarna-modra);
            text-align: center;
        }

        .logo-area img {
            height: 70px;
            margin-bottom: 20px;
            cursor: pointer;
        }

        h2 {
            color: var(--primarna-modra);
            font-size: 1.5rem;
            margin-bottom: 10px;
            font-weight: 700;
        }

        p.subtitle {
            color: #777;
            font-size: 0.9rem;
            margin-bottom: 30px;
        }

        .form-group {
            text-align: left;
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            font-size: 0.85rem;
            font-weight: 600;
            margin-bottom: 8px;
            color: #555;
        }

        .form-group input {
            width: 100%;
            padding: 12px 15px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 0.95rem;
            box-sizing: border-box;
            outline: none;
            transition: border-color 0.2s;
        }

        .form-group input:focus {
            border-color: var(--primarna-modra);
        }

        .btn-primary {
            width: 100%;
            background-color: var(--poudarek-oranza); /* Oranžna kot pri registraciji */
            color: white;
            border: none;
            padding: 14px;
            border-radius: 30px;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            text-transform: uppercase;
            margin-top: 10px;
            transition: background 0.2s;
        }

        .btn-primary:hover {
            background-color: #e65100; /* Temnejša oranžna ob prehodu */
        }

        .btn-register {
            display: block;
            margin-top: 25px;
            color: var(--poudarek-oranza);
            text-decoration: none;
            font-weight: 600;
            font-size: 0.9rem;
        }

        .btn-register:hover {
            text-decoration: underline;
        }

        .secondary-link {
            display: block;
            margin-top: 15px;
            font-size: 0.85rem;
            color: #777;
            text-decoration: none;
        }
    </style>
</head>
<body>

<div class="auth-card">
    <div class="logo-area">
        <img src="/img/logo.png" onclick="window.location.href='index.html'" alt="Logo">
    </div>

    <h2>Prijava za podjetja</h2>
    <p class="subtitle">Dobrodošli nazaj! Vnesite svoje podatke.</p>

    <div class="form-group">
        <label>E-poštni naslov podjetja</label>
        <input type="email" id="login-email" placeholder="npr. info@podjetje.si">
    </div>

    <div class="form-group">
        <label>Geslo</label>
        <input type="password" id="login-password" placeholder="Vnesite vaše geslo">
    </div>

    <button class="btn-primary" onclick="loginPodjetje()">Vpiši se</button>

    <a href="#" class="secondary-link">Ste pozabili geslo?</a>
    
    <hr style="border: 0; border-top: 1px solid #eee; margin: 25px 0;">
    
    <span style="font-size: 0.85rem; color: #999;">Še nimate računa podjetja?</span>
    <a href="registracija-podjetje.html" class="btn-register">Registrirajte podjetje</a>

    <a href="index.html" class="secondary-link" style="margin-top: 20px;">← Nazaj na glavno stran</a>
</div>

<script>
async function loginPodjetje() {
    const email = document.getElementById('login-email').value;
    const geslo = document.getElementById('login-password').value;

    if (!email || !geslo) {
        alert("Vnesi podatke.");
        return;
    }

    const loginData = {
        Mail: email,
        Geslo: geslo
    };

    try {
        const response = await fetch('/api/Podjetje/login', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(loginData)
        });

        if (response.ok) {
            const podjetje = await response.json();
            localStorage.setItem('user_name', podjetje.ime);
            localStorage.setItem('is_logged_in', 'true');
            localStorage.setItem('user_role', 'podjetje');

            alert("Živijo, " + podjetje.ime);
            window.location.href = 'index.html';
        } else {
            alert("Napačno geslo ali e-pošta.");
        }
    } catch (e) {
        alert("Napaka pri povezavi.");
    }
}
 </script>
</body>
</html>
